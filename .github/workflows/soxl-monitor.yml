name: SOXL Monitor

# 자동 실행 (UTC 기준). 장중에는 30분마다 갱신 → 앱이 사실상 실시간 반영.
# GitHub 무료 cron은 부하 시간대에 종종 스킵되므로, 촘촘히 걸어 한 번 빠져도 다음 슬롯이 메움.
# - 한국장 09:00~15:30 KST = 00:00~06:30 UTC (삼성전자/하이닉스)
# - 미국장 09:30~16:00 ET = 13:30~20:00 UTC(EDT)/14:30~21:00 UTC(EST) → 13~21시로 DST 모두 커버 (SOXL/SOXX/NVDA)
on:
  schedule:
    - cron: '*/30 0-6 * * 1-5'    # 한국장: 평일 30분마다
    - cron: '*/30 13-21 * * 1-5'  # 미국장: 평일 30분마다 (EDT/EST 모두 커버)
    - cron: '50 20 * * *'         # 한국 05:50 - 아침 정기 브리핑(매일)
  workflow_dispatch:              # 수동 실행 버튼

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run SOXL monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POSITION_JSON: ${{ secrets.POSITION_JSON }}
          FORCE_BRIEFING: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          python scripts/soxl_monitor.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock/data.json stock/journal.json stock/alert_state.json
          if ! git diff --staged --quiet; then
            git commit -m "auto: SOXL data update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "변경 없음"
          fi
