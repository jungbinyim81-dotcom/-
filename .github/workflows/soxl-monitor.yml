name: SOXL Monitor

# [2026-06-19] 자동 스케줄 제거됨.
#   - 이전엔 평일 30분마다(~33회/일) 같은 repo `-`에 data.json을 auto-commit·push →
#     team4(일병4팀 통합분석) 배포 push가 "fetch first"로 계속 거부되던 원인.
#   - 빛날빈님 지시로 SOXL 자동업데이트 중단. 필요 시 아래 "Run workflow"(수동) 버튼으로만 실행.
#   - 다시 자동화하려면 schedule: 블록을 복구하면 됨(아래 주석 참고).
# schedule:
#   - cron: '*/30 0-6 * * 1-5'    # 한국장: 평일 30분마다
#   - cron: '*/30 13-21 * * 1-5'  # 미국장: 평일 30분마다 (EDT/EST 모두 커버)
#   - cron: '50 20 * * *'         # 한국 05:50 - 아침 정기 브리핑(매일)
on:
  workflow_dispatch:              # 수동 실행 버튼만 유지 (자동 스케줄 없음)

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Run SOXL monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          POSITION_JSON: ${{ secrets.POSITION_JSON }}
          SWITCH_POSITION_JSON: ${{ secrets.SWITCH_POSITION_JSON }}
          FORCE_BRIEFING: ${{ github.event_name == 'workflow_dispatch' && 'true' || 'false' }}
        run: |
          python scripts/soxl_monitor.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stock/data.json stock/journal.json stock/alert_state.json
          if ! git diff --staged --quiet; then
            git commit -m "auto: SOXL data update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "변경 없음"
          fi
