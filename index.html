function getVal(prods, key) {
  if (!prods) return 0;
  if (key === '로수바미브')   return prods['로수바미브']   || 0;
  if (key === '아토바미브')   return prods['아토바미브정'] || 0;
  if (key === '자디앙F')      return (prods['자디앙'] || 0) + (prods['자디앙듀오'] || 0);
  if (key === '에스글리토')   return prods['에스글리토']   || 0;
  if (key === '트루셋저용량') return prods['트루셋저용량'] || 0;
  if (key === '트윈로우')     return prods['트윈로우']     || 0;
  return prods[key] || 0;
}

  [...allKeys].filter(k => !FIXED_RAW.has(k)).sort().forEach(k => {
    evalSel.innerHTML += `<option value="${k}">${k}</option>`;
  });

  // extraProductSelect: 전체 컬럼 (7번째 자유선택)
  const extraSel = document.getElementById('extraProductSelect');
  extraSel.innerHTML = '';
  [...allKeys].sort().forEach(k => {
    extraSel.innerHTML += `<option value="${k}">${k}</option>`;
  });

  updateEvalChart();
  updateProductChart();

  document.getElementById('chartModal').style.display = 'flex';
}

function closeChart() {
  document.getElementById('chartModal').style.display = 'none';
}

document.getElementById('chartModal').addEventListener('click', function(e) {
  if (e.target === this) closeChart();
});
</script>
