<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>거래처지도</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family:'맑은 고딕',sans-serif; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
#topPanel {
  display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  padding:8px 12px; background:#1A2D50; z-index:1000; position:relative;
}
#searchBox {
  flex:1; min-width:150px; max-width:240px;
  padding:7px 12px; border:none; border-radius:20px;
  font-size:13px; outline:none;
}
#personSelect {
  padding:7px 10px; border:none; border-radius:20px;
  font-size:13px; cursor:pointer; outline:none; background:white; color:#333;
}
.toggleBtn {
  padding:5px 12px; border:2px solid transparent; border-radius:20px;
  font-size:12px; cursor:pointer; color:white; font-weight:bold;
  transition:opacity 0.2s, transform 0.1s;
}
.toggleBtn.off { opacity:0.3; }
#countBadge { margin-left:auto; color:#9ab; font-size:12px; white-space:nowrap; }
#searchDropdown {
  position:fixed; top:52px; left:12px; width:250px;
  background:white; border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,0.22);
  z-index:9999; max-height:280px; overflow-y:auto; display:none;
}
.searchItem {
  padding:9px 14px; font-size:13px; cursor:pointer;
  border-bottom:1px solid #f0f0f0; color:#333;
}
.searchItem:hover { background:#f5f8ff; }
.searchItem b { color:#4a90d9; }
#map { flex:1; }
#chartModal {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.55); z-index:99999;
  align-items:center; justify-content:center;
}
#chartModal.show { display:flex; }
#modalBox {
  background:white; border-radius:12px; padding:28px 32px;
  width:740px; max-width:95vw; max-height:92vh;
  overflow-y:auto; position:relative; font-family:'맑은 고딕',sans-serif;
}
</style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1A2D50">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="거래처지도">
  <link rel="apple-touch-icon" href="icon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<div id="topPanel">
  <input id="searchBox" type="text" placeholder="거래처 검색..." oninput="onSearch(this.value)">
  <select id="personSelect" onchange="onPersonSel()">
    <option value="">담당자 전체</option>
  </select>
  <span id="countBadge">157개</span>
</div>
<div id="searchDropdown"></div>

<div id="map"></div>

<div id="chartModal" onclick="if(event.target===this)closeChart()">
  <div id="modalBox">
    <button onclick="closeChart()"
      style="position:absolute;top:14px;right:18px;background:none;border:none;font-size:22px;cursor:pointer;color:#666;">&#10005;</button>
    <h3 id="chartTitle" style="margin:0 0 6px;font-size:17px;color:#333;"></h3>
    <p id="chartSub" style="margin:0 0 18px;font-size:13px;color:#888;"></p>
    <div style="margin-bottom:28px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <p style="font-weight:bold;font-size:13px;color:#555;margin:0;">월별 평가실적</p>
        <select id="evalProductSelect" onchange="updateEvalChart()"
          style="font-size:12px;border:1px solid #ddd;border-radius:4px;padding:3px 8px;cursor:pointer;max-width:160px;"></select>
      </div>
      <canvas id="evalChart" height="110"></canvas>
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
        <p style="font-weight:bold;font-size:13px;color:#555;margin:0;">최근3개월 품목별 실적</p>
        <select id="extraProductSelect" onchange="updateProductChart()"
          style="font-size:12px;border:1px solid #ddd;border-radius:4px;padding:3px 8px;cursor:pointer;max-width:160px;"></select>
      </div>
      <canvas id="productChart" height="260"></canvas>
    </div>
  </div>
</div>

// ── 담당자 선택 (dropdown) ──────────────────────────────────
let selectedPerson = '';

function onPersonSel() {
  selectedPerson = pSel.value;
  if (selectedPerson) {
    PERSONS.forEach(p => {
      toggleStates[p] = (p === selectedPerson);
      document.getElementById('btn_' + p).classList.toggle('off', !toggleStates[p]);
    });
  } else {
    PERSONS.forEach(p => {
      toggleStates[p] = true;
      document.getElementById('btn_' + p).classList.remove('off');
    });
  }
  applyVisibility();
  if (selectedPerson) {
    const pts = markerObjs
      .filter(o => o.data.p === selectedPerson)
      .map(o => [o.data.y, o.data.x]);
    if (pts.length) map.fitBounds(pts, {padding:[50,50]});
  }
}

// ── 토글 버튼 ──────────────────────────────────────────────
function togglePerson(p) {
  toggleStates[p] = !toggleStates[p];
  document.getElementById('btn_' + p).classList.toggle('off', !toggleStates[p]);
  pSel.value = '';
  selectedPerson = '';
  applyVisibility();
}

// ── 마커 표시/숨김 ─────────────────────────────────────────
function applyVisibility() {
  let cnt = 0;
  markerObjs.forEach(o => {
    const show = toggleStates[o.data.p];
    if (show && !o.visible) { o.marker.addTo(map); o.visible = true; }
    if (!show && o.visible) { map.removeLayer(o.marker); o.visible = false; }
    if (show) cnt++;
  });
  countBadge.textContent = cnt + '개';
}

  const i = text.toLowerCase().indexOf(q.toLowerCase());
  if (i < 0) return text;
  return text.slice(0,i) + '<b>' + text.slice(i, i+q.length) + '</b>' + text.slice(i+q.length);
}

function onSearch(val) {
  clearTimeout(searchTimer);
  if (!val.trim()) { dd.style.display='none'; return; }
  searchTimer = setTimeout(() => {
    const q = val.trim();
    const hits = markerObjs.filter(o => o.data.n.toLowerCase().includes(q.toLowerCase())).slice(0,20);
    if (!hits.length) { dd.style.display='none'; return; }
    dd.innerHTML = hits.map(o =>
      '<div class="searchItem" data-name="' + o.data.n.replace(/&/g,'&amp;').replace(/"/g,'&quot;') + '">' +
      highlight(o.data.n, q) +
      ' <span style="color:#999;font-size:11px;">' + o.data.p + '</span></div>'
    ).join('');
    dd.querySelectorAll('.searchItem').forEach(el => {
      el.addEventListener('click', () => selectPlace(el.dataset.name));
    });
    dd.style.display = 'block';
  }, 150);
}

function selectPlace(name) {
  const o = markerObjs.find(x => x.data.n === name);
  if (!o) return;
  document.getElementById('searchBox').value = name;
  dd.style.display = 'none';
  map.setView([o.data.y, o.data.x], 15);
  o.marker.fire('click');
}

document.addEventListener('click', e => {
  if (!e.target.closest('#searchBox') && !e.target.closest('#searchDropdown'))
    dd.style.display = 'none';
});

// ── 처방현황 차트 ──────────────────────────────────────────
let evalChart = null, productChart = null, currentName = null;

const FIXED_PRODUCTS = ['로수바미브','아토바미브','자디앙F','에스글리토','트루셋저용량','트윈로우'];
const FIXED_RAW = new Set(['로수바미브','아토바미브정','아토바미브에이','자디앙','자디앙듀오','에스글리토','트루셋저용량','트윈로우']);

function getVal(prods, key) {
  if (!prods) return 0;
  if (key==='로수바미브')   return prods['로수바미브']||0;
  if (key==='아토바미브')   return prods['아토바미브정']||0;
  if (key==='자디앙F')      return (prods['자디앙']||0)+(prods['자디앙듀오']||0);
  if (key==='에스글리토')   return prods['에스글리토']||0;
  if (key==='트루셋저용량') return prods['트루셋저용량']||0;
  if (key==='트윈로우')     return prods['트윈로우']||0;
  return prods[key]||0;
}

function updateEvalChart() {
  const d = CHART_DATA[currentName]; if (!d) return;
  const sel = document.getElementById('evalProductSelect').value;
  const arr = sel==='_total' ? d.evals : d.months.map(m => getVal(d.products_by_month[m], sel));
  if (evalChart) evalChart.destroy();
  evalChart = new Chart(document.getElementById('evalChart'), {
    type:'bar',
    data:{
      labels:d.months,
      datasets:[{label:sel==='_total'?'평가실적':sel, data:arr, backgroundColor:'#4a90d9', borderRadius:4}]
    },
    options:{
      plugins:{legend:{display:false}, datalabels:{display:false}},
      scales:{y:{beginAtZero:true, ticks:{callback:v=>v.toLocaleString()}}}
    }
  });
}

function updateProductChart() {
  const d = CHART_DATA[currentName]; if (!d) return;
  const last3 = d.months.slice(-3);
  const latestM = d.months[d.months.length-1];
  const extraKey = document.getElementById('extraProductSelect').value;
  const labels = [...FIXED_PRODUCTS, extraKey||''];
  const latestVals = labels.map(k => getVal(d.products_by_month[latestM], k));
  const avgVals = labels.map(k => {
    const s = last3.reduce((a,m) => a + getVal(d.products_by_month[m], k), 0);
    return Math.round(s / (last3.length||1));
  });
  if (productChart) productChart.destroy();
  productChart = new Chart(document.getElementById('productChart'), {
    type:'bar',
    data:{
      labels,
      datasets:[
        {label:'최근월('+latestM+')', data:latestVals, backgroundColor:'#4a90d9', borderRadius:3},
        {label:'3개월 평균', data:avgVals, backgroundColor:'#f0a040', borderRadius:3},
      ]
    },
    options:{
      indexAxis:'y',
      plugins:{
        legend:{display:true, position:'top'},
        datalabels:{anchor:'end', align:'right', formatter:v=>v>0?v.toLocaleString():'', font:{size:10}, color:'#444'},
      },
      layout:{padding:{right:55}},
      scales:{x:{beginAtZero:true, ticks:{callback:v=>v.toLocaleString()}}}
    },
    plugins:[ChartDataLabels],
  });
}

function openChart(name) {
  const d = CHART_DATA[name]; if (!d) return;
  currentName = name;
  document.getElementById('chartTitle').textContent = name;
  document.getElementById('chartSub').textContent = '담당자: ' + d.person;

  const allKeys = new Set();
  d.months.forEach(m => Object.keys(d.products_by_month[m]||{}).forEach(k => allKeys.add(k)));

  const evalSel = document.getElementById('evalProductSelect');
  evalSel.innerHTML = '<option value="_total">전체 평가실적</option>';
  FIXED_PRODUCTS.forEach(p => {
    const o = document.createElement('option');
    o.value = p; o.textContent = p;
    evalSel.appendChild(o);
  });
  [...allKeys].filter(k => !FIXED_RAW.has(k)).sort().forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = k;
    evalSel.appendChild(o);
  });

  const extraSel = document.getElementById('extraProductSelect');
  extraSel.innerHTML = '';
  [...allKeys].sort().forEach(k => {
    const o = document.createElement('option');
    o.value = k; o.textContent = k;
    extraSel.appendChild(o);
  });

  updateEvalChart();
  updateProductChart();
  document.getElementById('chartModal').classList.add('show');
}

function closeChart() {
  document.getElementById('chartModal').classList.remove('show');
  if (evalChart)   { evalChart.destroy();   evalChart=null; }
  if (productChart){ productChart.destroy(); productChart=null; }
}
</script>
