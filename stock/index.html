<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SOXL</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1419">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SOXL">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f1419;
  --card: #1a2027;
  --card2: #232a33;
  --text: #e8eef5;
  --sub: #8a96a4;
  --profit: #ff4757;
  --loss: #2196f3;
  --warn: #ffa726;
  --line: #2c3540;
}
html { font-size: 16px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 600px; margin: 0 auto; padding: 16px 14px 80px; }

header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
}
.title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.updated { font-size: 12px; color: var(--sub); }
.refresh-btn {
  background: var(--card);
  border: 1px solid var(--line);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 12px;
  cursor: pointer;
}
.refresh-btn:active { background: var(--card2); }

.hero {
  background: linear-gradient(135deg, #1a2027 0%, #2c3540 100%);
  border-radius: 18px;
  padding: 22px 20px;
  margin-bottom: 14px;
  text-align: center;
  border: 1px solid var(--line);
}
.hero-label { font-size: 12px; color: var(--sub); margin-bottom: 6px; }
.hero-value { font-size: 38px; font-weight: 800; letter-spacing: -1px; }
.hero-pct { font-size: 15px; margin-top: 4px; color: var(--sub); }
.hero-value.profit, .hero-pct.profit { color: var(--profit); }
.hero-value.loss, .hero-pct.loss { color: var(--loss); }

.market-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 14px;
}
.market-chip {
  background: var(--card);
  padding: 10px 6px;
  border-radius: 12px;
  text-align: center;
  border: 1px solid var(--line);
}
.market-chip .label { font-size: 10px; color: var(--sub); }
.market-chip .value { font-size: 14px; font-weight: 700; margin-top: 2px; }
.market-chip .change { font-size: 10px; margin-top: 2px; }

.position-card {
  background: var(--card);
  border-radius: 16px;
  padding: 18px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  position: relative;
}
.position-card.inactive { opacity: 0.55; }
.pos-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 14px;
}
.pos-ticker { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.pos-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 6px;
  margin-left: 6px;
  vertical-align: middle;
}
.pos-tag.bet { background: rgba(255,71,87,0.15); color: var(--profit); }
.pos-tag.safe { background: rgba(33,150,243,0.15); color: var(--loss); }
.pos-pct {
  font-size: 24px;
  font-weight: 800;
  text-align: right;
}
.pos-pct.profit { color: var(--profit); }
.pos-pct.loss { color: var(--loss); }
.pos-pct .sub { font-size: 13px; color: var(--sub); font-weight: 500; display: block; margin-top: 2px; }

.sparkline { height: 50px; margin: 12px -4px; }

.pos-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.pos-cell {
  background: var(--card2);
  padding: 10px 12px;
  border-radius: 10px;
}
.pos-cell .label { font-size: 10px; color: var(--sub); }
.pos-cell .value { font-size: 14px; font-weight: 700; margin-top: 2px; }

.targets {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.target {
  padding: 10px 12px;
  border-radius: 10px;
  font-size: 12px;
}
.target.stop { background: rgba(255,71,87,0.1); border-left: 3px solid var(--profit); }
.target.take { background: rgba(76,217,100,0.1); border-left: 3px solid #4cd964; }
.target .label { color: var(--sub); font-size: 10px; }
.target .value { font-size: 14px; font-weight: 700; margin-top: 2px; }
.target .dist { font-size: 11px; color: var(--sub); margin-top: 2px; }

.inactive-msg {
  text-align: center;
  padding: 16px;
  color: var(--sub);
  font-size: 13px;
}
.memo { font-size: 11px; color: var(--sub); margin-top: 10px; }

.warning {
  background: rgba(255,167,38,0.12);
  border-left: 3px solid var(--warn);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 13px;
  margin-bottom: 12px;
  color: var(--warn);
}
.warning.danger {
  background: rgba(255,71,87,0.12);
  border-left-color: var(--profit);
  color: var(--profit);
}

.rate-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
}
.rate-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--sub);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.rate-status {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 6px;
  letter-spacing: 0;
}
.rate-status.normal { background: rgba(33,150,243,0.15); color: var(--loss); }
.rate-status.warn { background: rgba(255,167,38,0.15); color: var(--warn); }
.rate-status.danger { background: rgba(255,71,87,0.15); color: var(--profit); }

.rate-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.rate-item {
  background: var(--card2);
  padding: 10px 6px;
  border-radius: 10px;
  text-align: center;
}
.rate-item .label { font-size: 10px; color: var(--sub); }
.rate-item .value { font-size: 14px; font-weight: 700; margin-top: 2px; }
.rate-item .change { font-size: 10px; margin-top: 2px; }

.event-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-top: 12px;
}
.event-card {
  background: var(--card2);
  padding: 10px 12px;
  border-radius: 10px;
}
.event-card.imminent {
  background: rgba(255,71,87,0.12);
  border-left: 3px solid var(--profit);
}
.event-card.upcoming {
  background: rgba(255,167,38,0.12);
  border-left: 3px solid var(--warn);
}
.event-card .name { font-size: 11px; color: var(--sub); }
.event-card .date { font-size: 13px; font-weight: 700; margin-top: 2px; }
.event-card .dday { font-size: 12px; margin-top: 2px; font-weight: 600; }
.event-card.imminent .dday { color: var(--profit); }
.event-card.upcoming .dday { color: var(--warn); }

.decision-card {
  border-radius: 18px;
  padding: 20px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  position: relative;
  overflow: hidden;
}
.decision-card.green { background: linear-gradient(135deg, rgba(76,217,100,0.15), var(--card)); border-left: 4px solid #4cd964; }
.decision-card.yellow { background: linear-gradient(135deg, rgba(255,167,38,0.15), var(--card)); border-left: 4px solid var(--warn); }
.decision-card.red { background: linear-gradient(135deg, rgba(255,71,87,0.15), var(--card)); border-left: 4px solid var(--profit); }
.decision-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.decision-light {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--sub);
  text-transform: uppercase;
}
.decision-score {
  font-size: 28px;
  font-weight: 800;
  letter-spacing: -1px;
}
.green .decision-score { color: #4cd964; }
.yellow .decision-score { color: var(--warn); }
.red .decision-score { color: var(--profit); }
.decision-title {
  font-size: 20px;
  font-weight: 800;
  margin-bottom: 4px;
}
.decision-desc { font-size: 13px; color: var(--sub); margin-bottom: 14px; }
.factor-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.factor-col h4 {
  font-size: 10px;
  color: var(--sub);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.factor-col ul { list-style: none; }
.factor-col li {
  font-size: 12px;
  padding: 4px 0;
  line-height: 1.4;
}
.factor-col li::before { content: "▸ "; }
.factor-col.pros li { color: #4cd964; }
.factor-col.cons li { color: var(--profit); }

.sensitivity-card {
  background: var(--card);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--line);
}
.sens-title { font-size: 12px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 12px; }
.sens-hero {
  background: var(--card2);
  padding: 14px;
  border-radius: 12px;
  margin-bottom: 12px;
}
.sens-hero .label { font-size: 11px; color: var(--sub); }
.sens-hero .value { font-size: 16px; font-weight: 700; margin-top: 4px; }
.sens-hero .hint { font-size: 11px; color: var(--sub); margin-top: 4px; }

.beta-table { width: 100%; font-size: 12px; }
.beta-table th, .beta-table td { padding: 6px 4px; text-align: right; border-bottom: 1px solid var(--line); }
.beta-table th { color: var(--sub); font-weight: 500; font-size: 10px; text-transform: uppercase; }
.beta-table td:first-child, .beta-table th:first-child { text-align: left; }
.beta-table .corr-strong { color: #4cd964; }
.beta-table .corr-weak { color: var(--sub); }
.beta-table .neg { color: var(--loss); }

.scenarios { display: grid; gap: 8px; }
.scenario-row {
  background: var(--card2);
  padding: 12px;
  border-radius: 10px;
  border-left: 3px solid var(--line);
}
.scenario-row.high { border-left-color: var(--profit); }
.scenario-row.low { border-left-color: #4cd964; }
.scenario-row .name { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.scenario-row .cond { font-size: 10px; color: var(--sub); margin-bottom: 6px; }
.scenario-row .impact {
  font-size: 16px;
  font-weight: 800;
  text-align: right;
}
.scenario-row.high .impact { color: var(--profit); }
.scenario-row.low .impact { color: #4cd964; }

.sector-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.sector-tile {
  padding: 12px 6px;
  border-radius: 10px;
  text-align: center;
  color: white;
  font-weight: 600;
}
.sector-tile .ticker { font-size: 12px; font-weight: 800; }
.sector-tile .name { font-size: 9px; opacity: 0.85; margin-top: 2px; }
.sector-tile .price { font-size: 11px; margin-top: 6px; opacity: 0.9; }
.sector-tile .pct { font-size: 14px; font-weight: 800; margin-top: 2px; }

.news-list { display: grid; gap: 8px; }
.news-item {
  background: var(--card2);
  padding: 12px;
  border-radius: 10px;
  border-left: 3px solid var(--line);
  text-decoration: none;
  color: inherit;
  display: block;
}
.news-item .src { font-size: 10px; color: var(--sub); margin-bottom: 4px; }
.news-item .title { font-size: 13px; font-weight: 600; line-height: 1.4; }

.tab-bar {
  display: flex;
  gap: 6px;
  margin: 14px 0 12px;
  background: var(--card);
  border-radius: 12px;
  padding: 4px;
  border: 1px solid var(--line);
  overflow-x: auto;
}
.tab-btn {
  flex: 1;
  background: transparent;
  color: var(--sub);
  border: none;
  padding: 8px 12px;
  font-size: 12px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  white-space: nowrap;
}
.tab-btn.active { background: var(--card2); color: var(--text); }
.tab-content > div { display: none; }
.tab-content > div.active { display: block; }

.rules-card {
  background: var(--card);
  border-radius: 14px;
  padding: 16px;
  border: 1px solid var(--line);
  margin-top: 14px;
}
.rules-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--warn);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
}
.rules-list { list-style: none; }
.rules-list li {
  font-size: 13px;
  padding: 6px 0;
  color: var(--text);
  line-height: 1.5;
  border-bottom: 1px solid var(--line);
}
.rules-list li:last-child { border-bottom: none; }
.rules-list li::before { content: "•"; color: var(--warn); margin-right: 8px; }

.loading { text-align: center; padding: 40px; color: var(--sub); }
.error { text-align: center; padding: 40px; color: var(--profit); font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="title">SOXL Monitor</div>
      <div class="updated" id="updated">로딩 중...</div>
    </div>
    <button class="refresh-btn" onclick="loadData()">새로고침</button>
  </header>
  <div id="content" class="loading">데이터 로딩 중...</div>
</div>

<script>
const fmt = (n, d=2) => n.toLocaleString('ko-KR', {minimumFractionDigits: d, maximumFractionDigits: d});
const fmtKRW = n => Math.round(n).toLocaleString('ko-KR');
const cls = n => n >= 0 ? 'profit' : 'loss';
const sign = n => n >= 0 ? '+' : '';

function sparkline(data, color) {
  if (!data || data.length < 2) return '';
  const w = 320, h = 50;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  const points = data.map((v, i) => `${(i*step).toFixed(1)},${(h - ((v-min)/range)*h).toFixed(1)}`).join(' ');
  return `<svg class="sparkline" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" width="100%" height="50">
    <polyline points="${points}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round"/>
  </svg>`;
}

function renderMarket(시장) {
  const items = [
    { label: 'VIX', value: fmt(시장.VIX.현재가), change: 시장.VIX.등락률 },
    { label: '필반', value: fmt(시장.필반.현재가, 0), change: 시장.필반.등락률 },
    { label: 'NVDA', value: '$'+fmt(시장.NVDA.현재가), change: 시장.NVDA.등락률 },
    { label: '환율', value: fmt(시장.환율.현재가, 1), change: 시장.환율.등락률 },
  ];
  return items.map(i => `
    <div class="market-chip">
      <div class="label">${i.label}</div>
      <div class="value">${i.value}</div>
      <div class="change ${cls(i.change)}">${sign(i.change)}${fmt(i.change)}%</div>
    </div>
  `).join('');
}

function renderPosition(p) {
  const tag = p.종목 === 'SOXL' ? '<span class="pos-tag bet">BET</span>' : '<span class="pos-tag safe">SAFE</span>';

  if (!p.활성) {
    return `<div class="position-card inactive">
      <div class="pos-header">
        <div><span class="pos-ticker">${p.종목}</span>${tag}</div>
      </div>
      <div class="inactive-msg">매수 전 — 포지션.json 업데이트 필요</div>
      <div class="memo">${p.메모 || ''} / 투자 예정 ${fmtKRW(p.투자금)}원</div>
    </div>`;
  }
  if (p.에러) {
    return `<div class="position-card inactive">
      <div class="pos-header"><div class="pos-ticker">${p.종목}</div></div>
      <div class="inactive-msg">${p.에러}</div>
    </div>`;
  }

  const color = p.손익률 >= 0 ? '#ff4757' : '#2196f3';
  return `<div class="position-card">
    <div class="pos-header">
      <div><span class="pos-ticker">${p.종목}</span>${tag}</div>
      <div class="pos-pct ${cls(p.손익률)}">
        ${sign(p.손익률)}${fmt(p.손익률)}%
        <span class="sub">${sign(p.평가손익_KRW)}${fmtKRW(p.평가손익_KRW)}원</span>
      </div>
    </div>
    ${sparkline(p.스파크라인, color)}
    <div class="pos-grid">
      <div class="pos-cell">
        <div class="label">진입가</div>
        <div class="value">${p.통화기호}${fmt(p.진입가)}</div>
      </div>
      <div class="pos-cell">
        <div class="label">현재가</div>
        <div class="value">${p.통화기호}${fmt(p.현재가)}</div>
      </div>
      <div class="pos-cell">
        <div class="label">수량</div>
        <div class="value">${p.수량.toLocaleString()}주</div>
      </div>
      <div class="pos-cell">
        <div class="label">평가손익</div>
        <div class="value ${cls(p.평가손익)}">${p.통화기호}${sign(p.평가손익)}${fmt(p.평가손익)}</div>
      </div>
    </div>
    <div class="targets">
      <div class="target stop">
        <div class="label">손절 (${p.손절_퍼센트}%)</div>
        <div class="value">${p.통화기호}${fmt(p.손절선)}</div>
        <div class="dist">${sign(p.손절까지_퍼센트)}${fmt(p.손절까지_퍼센트, 1)}% 남음</div>
      </div>
      <div class="target take">
        <div class="label">익절 (+${p.익절_퍼센트}%)</div>
        <div class="value">${p.통화기호}${fmt(p.익절선)}</div>
        <div class="dist">${fmt(p.익절까지_퍼센트, 1)}% 남음</div>
      </div>
    </div>
    <div class="memo">${p.메모 || ''}</div>
  </div>`;
}

function renderRates(금리) {
  if (!금리 || !금리['10년물']) return '';
  const t10 = 금리['10년물'];
  const irx = 금리['단기금리'];
  const dxy = 금리['DXY'];
  const 차 = 금리['장단기차'];

  // bp 변화 (수익률 % 차이 * 100)
  const t10_bp = (t10.현재가 - t10.전일가) * 100;
  const irx_bp = irx ? (irx.현재가 - irx.전일가) * 100 : 0;

  let 상태 = 'normal', 상태문 = '정상';
  if (t10.현재가 >= 4.5 || Math.abs(t10_bp) >= 5) { 상태 = 'warn'; 상태문 = '주의'; }
  if (t10.현재가 >= 4.8 || t10_bp >= 10) { 상태 = 'danger'; 상태문 = '위험'; }

  const 역전배지 = 금리.역전 ? ' <span style="color:#ff4757">⚠ 역전</span>' : '';

  return `<div class="rate-card">
    <div class="rate-title">
      <span>금리 / 달러 (반도체 매크로)</span>
      <span class="rate-status ${상태}">${상태문}</span>
    </div>
    <div class="rate-grid">
      <div class="rate-item">
        <div class="label">10년물</div>
        <div class="value">${fmt(t10.현재가, 2)}%</div>
        <div class="change ${cls(-t10_bp)}">${t10_bp >= 0 ? '+' : ''}${fmt(t10_bp, 1)}bp</div>
      </div>
      <div class="rate-item">
        <div class="label">단기 (13W)</div>
        <div class="value">${irx ? fmt(irx.현재가, 2) : '-'}%</div>
        <div class="change ${cls(-irx_bp)}">${irx_bp >= 0 ? '+' : ''}${fmt(irx_bp, 1)}bp</div>
      </div>
      <div class="rate-item">
        <div class="label">장-단기${역전배지}</div>
        <div class="value">${차 !== null ? (차 >= 0 ? '+' : '') + fmt(차, 2) + '%' : '-'}</div>
        <div class="change" style="color:var(--sub)">10Y-13W</div>
      </div>
      <div class="rate-item">
        <div class="label">DXY</div>

    </div>

  </div>`;
}

let __이벤트캐시 = null;
function renderEvents() {
  if (!__이벤트캐시) return '';
  const fomc = __이벤트캐시.다음FOMC;
  const cpi = __이벤트캐시.다음CPI;
  if (!fomc && !cpi) return '';

  const card = (ev, label) => {
    if (!ev) return '';
    const 클래스 = ev.남은일 <= 3 ? 'imminent' : (ev.남은일 <= 7 ? 'upcoming' : '');
    return `<div class="event-card ${클래스}">
      <div class="name">다음 ${label}</div>
      <div class="date">${ev.일자}</div>
      <div class="dday">D-${ev.남은일}일</div>
    </div>`;
  };

  return `<div class="event-row">${card(fomc, 'FOMC')}${card(cpi, 'CPI')}</div>`;
}

function setupTabs() {
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-content > div').forEach(d => d.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });
}

function renderDecision(점수) {
  if (!점수) return '';
  const 신호 = 점수.신호;
  const prosHTML = (점수.근거 || []).map(r => `<li>${r}</li>`).join('') || '<li>주요 호재 없음</li>';
  const consHTML = (점수.감점 || []).map(r => `<li>${r}</li>`).join('') || '<li>주요 위험 없음</li>';
  return `<div class="decision-card ${신호}">
    <div class="decision-head">
      <span class="decision-light">매크로 신호</span>
      <span class="decision-score">${점수.점수}</span>
    </div>
    <div class="decision-title">${점수.결정}</div>
    <div class="decision-desc">${점수.설명}</div>
    <div class="factor-list">
      <div class="factor-col pros">
        <h4>호재 / 진입 근거</h4>
        <ul>${prosHTML}</ul>
      </div>
      <div class="factor-col cons">
        <h4>위험 / 회피 근거</h4>
        <ul>${consHTML}</ul>
      </div>
    </div>
  </div>`;
}

function renderSKEW(s) {
  if (!s) return '';
  let 색 = 'var(--profit)';
  let 배지 = 'danger';
  if (s.위험도 === '낮음') { 색 = '#4cd964'; 배지 = 'normal'; }
  else if (s.위험도 === '보통') { 색 = 'var(--loss)'; 배지 = 'normal'; }
  else if (s.위험도 === '주의') { 색 = 'var(--warn)'; 배지 = 'warn'; }
  else if (s.위험도 === '높음') { 색 = 'var(--warn)'; 배지 = 'warn'; }

  const VIX분기 = (s.VIX !== null && s.VIX < 18 && s.SKEW >= 135);
  return `<div class="sensitivity-card">
    <div class="sens-title">
      <span style="display:flex;justify-content:space-between;align-items:center">
        <span>SKEW 꼬리위험 (블랙스완 경고)</span>
        <span class="rate-status ${배지}">${s.위험도}</span>
      </span>
    </div>
    <div style="display:flex;align-items:baseline;gap:14px;background:var(--card2);padding:14px;border-radius:12px;margin-bottom:8px">
      <div>
        <div style="font-size:11px;color:var(--sub)">CBOE SKEW</div>
        <div style="font-size:32px;font-weight:800;color:${색};line-height:1">${s.SKEW.toFixed(1)}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:4px">${sign(s.SKEW_변화)}${fmt(s.SKEW_변화)}%</div>
      </div>
      <div style="flex:1">
        <div style="font-size:11px;color:var(--sub)">VIX 대비</div>
        <div style="font-size:14px;font-weight:700">VIX ${s.VIX !== null ? s.VIX.toFixed(1) : '-'} ${VIX분기 ? '<span style=\"color:var(--profit)\">⚠ 분기</span>' : ''}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:6px;line-height:1.4">${s.설명}</div>
      </div>

    <div style="font-size:10px;color:var(--sub);line-height:1.5">

      • <strong>VIX 낮은데 SKEW 높음 = 위기 직전 패턴</strong> (2008/2020 직전)<br>
      • SKEW는 옵션 시장의 "꼬리위험" 가격. 진짜 위기 신호는 여기서 먼저 나옴

function renderAITech(a) {
  if (!a || !a.종목 || !a.종목.length) return '';
  const 점수 = a.점수 ?? 0;
  const tagCls = 점수 >= 7 ? 'normal' : (점수 >= 4 ? 'warn' : 'danger');
  const tiles = a.종목.map(t => {
    const cls5 = t['5일'] >= 0 ? 'profit' : 'loss';
    const cls30 = t['30일'] >= 0 ? 'profit' : 'loss';
    return `<div class="pos-cell" style="padding:10px">
      <div style="display:flex;justify-content:space-between;align-items:baseline">
        <span style="font-size:13px;font-weight:800">${t.티커}</span>
        <span style="font-size:10px;color:var(--sub)">${t.이름}</span>
      </div>
      <div style="font-size:13px;font-weight:700;margin-top:4px">$${fmt(t.현재, 2)}</div>
      <div style="display:flex;gap:8px;font-size:10px;margin-top:4px">
        <span class="${cls5}">5일 ${sign(t['5일'])}${fmt(t['5일'])}%</span>
        <span class="${cls30}">30일 ${sign(t['30일'])}${fmt(t['30일'])}%</span>
      </div>
    </div>`;
  }).join('');

  return `<div class="sensitivity-card">
    <div class="sens-title">
      <span style="display:flex;justify-content:space-between;align-items:center">
        <span>AI 빅테크 (NVDA 주요 고객)</span>
        <span class="rate-status ${tagCls}">${점수}/10</span>
      </span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">${tiles}</div>
    <div style="font-size:10px;color:var(--sub);margin-top:10px;line-height:1.5">
      • NVDA 매출의 약 70%가 이 4사의 AI CapEx에서 발생<br>
      • 빅테크 강세 = NVDA 호재 = SOXL 호재 (선행지표)<br>
      • 빅테크 어닝/CapEx 가이던스 하향 = SOXL 즉시 타격
    </div>
  </div>`;
}

  const items = [];
  const map = {
    "신규실업수당": { 이름: "신규실업수당", 설명: "매주 목 22:30 (서머타임 21:30) — 경기 선행" },
    "ISM_PMI": { 이름: "ISM PMI", 설명: "매월 1영업일 — 반도체 수요 선행" },
    "NFP": { 이름: "비농업고용", 설명: "첫째 금 21:30 — 임금/소비 신호" },
  };
  for (const [k, info] of Object.entries(map)) {
    const ev = cal[k];
    if (!ev) continue;
    const 클래스 = ev.남은일 <= 1 ? 'imminent' : (ev.남은일 <= 3 ? 'upcoming' : '');
    items.push(`<div class="event-card ${클래스}">
      <div class="name">${info.이름}</div>
      <div class="date">${ev.일자}</div>
      <div class="dday">D-${ev.남은일}일</div>
      <div style="font-size:9px;color:var(--sub);margin-top:4px">${info.설명}</div>
    </div>`);
  }
  if (!items.length) return '';
  return `<div class="sensitivity-card">
    <div class="sens-title">이코노믹 캘린더 (추가 이벤트)</div>
    <div class="event-row" style="grid-template-columns:1fr 1fr 1fr">${items.join('')}</div>
  </div>`;
}

function fngColor(v) {
  if (v < 25) return '#ff4757';
  if (v < 45) return '#ffa726';
  if (v < 55) return '#94a3b8';
  if (v < 75) return '#76b900';
  return '#4cd964';
}

function renderTechnical(t) {
  if (!t) return '';
  const 점수 = t.점수 ?? 0;

  const ma200cls = t.MA200_편차 >= 0 ? 'profit' : 'loss';
  const ma50cls = t.MA50_편차 >= 0 ? 'profit' : 'loss';

  if (t.RSI >= 70) { rsiCls = 'loss'; rsiText = '과매수'; }
  else if (t.RSI <= 30) { rsiCls = 'profit'; rsiText = '과매도'; }

  return `<div class="sensitivity-card">
    <div class="sens-title">
      <span style="display:flex;justify-content:space-between;align-items:center">

      <div class="pos-cell">

        <div class="value">$${fmt(t.MA200, 2)}</div>

      <div style="margin-top:6px;height:6px;background:var(--card2);border-radius:3px;position:relative;overflow:hidden">
        <div style="position:absolute;left:30%;width:40%;height:100%;background:rgba(76,217,100,0.3)"></div>
        <div style="position:absolute;left:${Math.min(t.RSI, 100)}%;top:-2px;width:3px;height:10px;background:#fff;transform:translateX(-1px)"></div>

      • 200MA 대비 +100% 초과 = 평균회귀 위험 (조정 가능)<br>
      • RSI 70+ = 과매수 (단기 조정), 30- = 과매도 (반등 가능)
    </div>
  </div>`;
}

function renderSensitivity(상관베타) {
  if (!상관베타) return '<div class="sensitivity-card">상관관계 데이터 없음</div>';
  const 가장 = 상관베타.가장민감;
  const 베타 = 상관베타.베타 || {};
  const 상관 = 상관베타.상관 || {};

  // 베타 절댓값 정렬 (SOXX/SOX는 자명하니 제외 가능)
  const 표시순서 = ['DXY', 'TNX', 'VIX', 'NVDA', 'SOX', 'KRW', '하이닉스'];
  const rows = 표시순서.filter(k => k in 베타).map(k => {
    const b = 베타[k];
    const c = 상관[k];
    const corrCls = Math.abs(c) >= 0.5 ? 'corr-strong' : 'corr-weak';
    const betaCls = b < 0 ? 'neg' : '';
    let 의미 = '';
    if (k === 'TNX') 의미 = `금리 +1%p → SOXL ${b.toFixed(1)}%`;
    else if (k === 'VIX') 의미 = `VIX +1pt → SOXL ${b.toFixed(1)}%`;
    else if (k === 'DXY') 의미 = `DXY +1% → SOXL ${b.toFixed(1)}%`;
    else if (k === 'NVDA') 의미 = `NVDA +1% → SOXL ${b.toFixed(2)}%`;
    else if (k === 'SOX') 의미 = `SOX +1% → SOXL ${b.toFixed(2)}%`;
    else if (k === 'KRW') 의미 = `환율 +1% → SOXL ${b.toFixed(2)}%`;
    else 의미 = `1단위 → ${b.toFixed(2)}%`;
    return `<tr>
      <td>${k}</td>
      <td class="${corrCls}">${(c >= 0 ? '+' : '') + fmt(c, 2)}</td>
      <td class="${betaCls}">${(b >= 0 ? '+' : '') + fmt(b, 2)}</td>
      <td style="text-align:left;color:var(--sub);font-size:10px">${의미}</td>
    </tr>`;
  }).join('');

  const 인사이트 = 가장 ? `오늘 SOXL은 <strong>${가장.지표}</strong>에 가장 민감 (베타 ${가장.베타.toFixed(2)})` : '';

  return `<div class="sensitivity-card">
    <div class="sens-title">SOXL 매크로 민감도 (60일 일일수익률 기준)</div>
    <div class="sens-hero">
      <div class="label">가장 민감한 변수</div>
      <div class="value">${인사이트}</div>
      <div class="hint">이 변수의 움직임을 가장 우선 모니터링하세요</div>
    </div>
    <table class="beta-table">
      <thead><tr><th>지표</th><th>상관</th><th>베타</th><th>해석</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="font-size:10px;color:var(--sub);margin-top:10px;line-height:1.5">
      • 상관 ±1에 가까울수록 동조성 강함<br>
      • 베타 음수 = 역방향 (예: 금리/달러/VIX 상승 → SOXL 하락)<br>
      • 베타는 회귀 기울기로, 단순 곱셈 추정치
    </div>
  </div>`;
}

function renderScenarios(시나리오) {
  if (!시나리오 || !시나리오.length) return '';
  const rows = 시나리오.map(s => `

  return `<div class="sensitivity-card">
    <div class="sens-title">시나리오 분석 (SOXL 예상 변동)</div>
    <div class="scenarios">${rows}</div>

function renderSector(섹터) {
  if (!섹터 || !섹터.length) return '';
  const tile = s => {
    const pct = s.등락률;
    const intensity = Math.min(Math.abs(pct) / 5, 1);
    const r = pct >= 0 ? 255 : 33;
    const g = pct >= 0 ? 71 : 150;
    const b = pct >= 0 ? 87 : 243;
    const bg = `rgba(${r},${g},${b},${0.25 + intensity * 0.55})`;
    return `<div class="sector-tile" style="background:${bg}">
      <div class="ticker">${s.티커}</div>
      <div class="name">${s.이름}</div>
      <div class="price">$${fmt(s.현재가, 1)}</div>
      <div class="pct">${pct >= 0 ? '+' : ''}${fmt(pct, 2)}%</div>
    </div>`;
  };
  return `<div class="sensitivity-card">
    <div class="sens-title">반도체 섹터 히트맵</div>
    <div class="sector-grid">${섹터.map(tile).join('')}</div>
    <div style="font-size:10px;color:var(--sub);margin-top:8px">
      섹터 전반 강세 = SOXL 호재. 분기되면 NVDA/AVGO 비중 큰 SOXX 영향 가장 큼
    </div>
  </div>`;
}

    <a class="news-item" href="${n.link || '#'}" target="_blank" rel="noopener">
      <div class="src">${n.publisher || n.source} ${n.time ? '· ' + n.time : ''}</div>
      <div class="title">${n.title}</div>
    </a>
  `).join('');
  return `<div class="sensitivity-card">
    <div class="sens-title">뉴스 (반도체/금리)</div>
    <div class="news-list">${items}</div>
  </div>`;
}

function renderJournal(j) {
  if (!j || !j.엔트리 || !j.엔트리.length) {
    return `<div class="sensitivity-card">
      <div class="sens-title">매크로 점수 검증 일지</div>
      <div style="color:var(--sub);font-size:13px;line-height:1.7">
        아직 기록이 없습니다.<br>
        매일 미국장 마감 후 그날의 <b>매크로 점수·신호</b>와 <b>다음 거래일 SOXL 결과</b>가 자동으로 쌓입니다.<br>
        표본이 모이면 신호별 적중률과 평균 익일수익률이 여기에 표시됩니다.
      </div>
    </div>`;
  }
  const E = j.엔트리.slice().sort((a, b) => (a.거래일 < b.거래일 ? 1 : -1)); // 최신 먼저
  const judged = E.filter(e => e.익일등락 !== null && e.익일등락 !== undefined);
  const bucket = sig => judged.filter(e => e.신호 === sig);
  const hitN = arr => arr.filter(e => e.적중 === '적중').length;
  const avg = arr => arr.length ? arr.reduce((s, e) => s + e.익일등락, 0) / arr.length : 0;
  const g = bucket('green'), y = bucket('yellow'), r = bucket('red');
  const gHit = g.length ? Math.round(hitN(g) / g.length * 100) : null;
  const rHit = r.length ? Math.round(hitN(r) / r.length * 100) : null;
  const 판정n = g.length + r.length;
  const 전체률 = 판정n ? Math.round((hitN(g) + hitN(r)) / 판정n * 100) : null;

  const hitCard = (label, pct, n, color) => `
    <div style="flex:1;background:var(--card2);padding:12px 8px;border-radius:12px;text-align:center">
      <div style="font-size:10px;color:var(--sub)">${label}</div>
      <div style="font-size:22px;font-weight:800;color:${pct === null ? 'var(--sub)' : color}">${pct === null ? '—' : pct + '%'}</div>
      <div style="font-size:10px;color:var(--sub)">표본 ${n}일</div>
    </div>`;

  const maxAbs = Math.max(0.8, Math.abs(avg(g)), Math.abs(avg(y)), Math.abs(avg(r)));
  const bar = (label, arr, color) => {
    const v = avg(arr);
    const w = arr.length ? Math.max(4, Math.abs(v) / maxAbs * 100) : 0;
    return `<div style="margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px">
        <span style="color:${color};font-weight:700">${label}</span>
        <span style="color:var(--sub)">${arr.length}일 · 평균 익일 <b class="${v >= 0 ? 'profit' : 'loss'}">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</b></span>
      </div>
      <div style="height:8px;background:var(--card2);border-radius:4px;overflow:hidden">
        <div style="height:100%;width:${w}%;background:${v >= 0 ? 'var(--profit)' : 'var(--loss)'}"></div>
      </div>
    </div>`;
  };

  const rows = E.slice(0, 20).map(e => {
    const sigColor = e.신호 === 'green' ? '#4cd964' : (e.신호 === 'yellow' ? 'var(--warn)' : 'var(--profit)');
    const sigTxt = e.신호 === 'green' ? '녹' : (e.신호 === 'yellow' ? '황' : '적');
    const pend = (e.익일등락 === null || e.익일등락 === undefined);
    const 결과 = pend ? '<span style="color:var(--sub)">대기</span>'
      : `<span class="${e.익일등락 >= 0 ? 'profit' : 'loss'}">${e.익일등락 >= 0 ? '+' : ''}${e.익일등락.toFixed(2)}%</span>`;
    const mark = e.적중 === '적중' ? '<span style="color:#4cd964;font-weight:800">✓</span>'
      : e.적중 === '빗나감' ? '<span style="color:var(--profit);font-weight:800">✗</span>'
      : '<span style="color:var(--sub)">–</span>';
    let tr = `<tr>
      <td style="text-align:left">${(e.거래일 || '').slice(5)}</td>
      <td style="text-align:center"><b style="color:${sigColor}">${e.점수}</b></td>
      <td style="text-align:center;color:${sigColor};font-weight:700">${sigTxt}</td>
      <td style="text-align:right">${결과}</td>
      <td style="text-align:center">${mark}</td>
    </tr>`;
    if (e.메모) {
      tr += `<tr><td colspan="5" style="text-align:left;color:var(--sub);font-size:10px;padding:0 4px 6px">↳ ${e.메모}</td></tr>`;
    }
    return tr;
  }).join('');

  return `<div class="sensitivity-card">
    <div class="sens-title">매크로 점수 검증 — 신호 적중률</div>
    <div style="display:flex;gap:8px;margin-bottom:6px">
      ${hitCard('녹색(상승예측)', gHit, g.length, '#4cd964')}
      ${hitCard('적색(하락예측)', rHit, r.length, 'var(--profit)')}
      ${hitCard('전체', 전체률, 판정n, 'var(--text)')}
    </div>
    <div style="font-size:10px;color:var(--sub);margin-bottom:4px;line-height:1.5">
      마감 점수의 신호가 <b>다음 거래일</b> SOXL 방향을 맞췄는지로 채점 (황색=관망, 판정 제외)
    </div>
  </div>
  <div class="sensitivity-card">
    <div class="sens-title">신호별 평균 익일 SOXL 수익률</div>
    ${bar('녹색 신호일', g, '#4cd964')}
    ${bar('황색 신호일', y, 'var(--warn)')}
    ${bar('적색 신호일', r, 'var(--profit)')}
    <div style="font-size:10px;color:var(--sub);margin-top:6px;line-height:1.5">
      이상적 패턴: <b style="color:#4cd964">녹색일 평균 &gt; 0 &gt; 적색일 평균</b>. 벌어질수록 점수 신뢰도 높음
    </div>
  </div>
  <div class="sensitivity-card">
    <div class="sens-title">최근 일지 (${E.length}일 기록)</div>
    <table class="beta-table">
      <thead><tr>
        <th style="text-align:left">거래일</th><th style="text-align:center">점수</th>
        <th style="text-align:center">신호</th><th style="text-align:right">익일 SOXL</th>
        <th style="text-align:center">적중</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="font-size:10px;color:var(--sub);margin-top:10px;line-height:1.5">
      채점된 표본 ${judged.length}일. 통계적으로 의미있으려면 최소 20~30거래일 누적 필요.<br>
      메모 추가: 새록에게 "오늘 일지에 ~ 적어줘"
    </div>
  </div>`;
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
}

loadData();
// 5분마다 자동 갱신
setInterval(loadData, 5 * 60 * 1000);
</script>
</body>
</html>
